spring:
  application:
    name: file-upload-demo
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 5GB
      enabled: true
      file-size-threshold: 100MB

server:
  port: 9090
  servlet:
    context-path: /api
#  tomcat:
#    max-swallow-size: -1              # Tomcat不限制请求大小
#    max-http-form-post-size: -1       # Tomcat 9.0.44+需要配置

file:
  upload:
    path: ./uploads/
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx,txt,zip
    max-file-size: 2080000000

logging:
  level:
    com.example.fileupload: INFO
    org.springframework.web: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'


